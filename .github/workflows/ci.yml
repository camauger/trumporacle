name: ci

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.12"
          python-version: "3.12"
      - name: Sync
        run: uv sync --all-extras
      - name: Ruff
        run: uv run ruff check src tests && uv run ruff format --check src tests
      - name: Mypy (strict packages)
        run: uv run mypy src/trumporacle/prediction src/trumporacle/evaluation src/trumporacle/features
      - name: Pytest
        run: uv run pytest
